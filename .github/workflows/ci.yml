name: CI

# Verification + dependency-advisory gate for NexusAI Mission Control.
# Runs on every push and PR to main, and on a weekly schedule so newly
# disclosed advisories are caught even when the code is not changing.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 06:00 UTC — catch advisories disclosed since the last push.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # The scheduled run only needs the audit job, not a full rebuild.
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build boundary checks
        run: npm run check:boundaries

      - name: Typecheck
        timeout-minutes: 4
        run: npm exec -w @nexus/mission-control tsc -- --noEmit

      - name: Test
        timeout-minutes: 4
        run: npm test

      - name: Build
        timeout-minutes: 8
        run: npm run build
        env:
          # Build must succeed without external secrets; services no-op when unset.
          NEXT_TELEMETRY_DISABLED: "1"

  audit:
    name: Dependency advisory gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # Hard gate: any critical advisory fails the build.
      - name: Block critical advisories
        run: npm audit --audit-level=critical

      # Soft signal: surface high/moderate advisories without failing the build,
      # so they are visible in the log for triage but do not block a pilot ship.
      - name: Report high/moderate advisories (non-blocking)
        if: always()
        run: npm audit --audit-level=high || true
