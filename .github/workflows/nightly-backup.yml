# Nightly backup: Neon pg_dump + R2 originals sync to a backup bucket.
#
# R2 has no native object versioning (Cloudflare roadmap, not shipped as of
# 2026-07), so protection = copy to a second bucket the app never writes to.
#
# Required repository secrets:
#   NEON_DATABASE_URL   — direct (non-pooled) Neon connection string
#   R2_ACCOUNT_ID       — Cloudflare account id
#   R2_BACKUP_ACCESS_KEY_ID / R2_BACKUP_SECRET_ACCESS_KEY
#                       — token scoped to BOTH buckets (read source, write backup)
#   R2_BUCKET           — production originals bucket (e.g. nexus-originals)
#   R2_BACKUP_BUCKET    — backup bucket (e.g. nexus-originals-backup)
name: nightly-backup

on:
  schedule:
    - cron: "30 2 * * *" # 02:30 UTC daily
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install postgres client and rclone
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q postgresql-client rclone

      - name: Dump Neon database
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          pg_dump "$DATABASE_URL" --no-owner --format=custom \
            --file="neon-$(date -u +%Y%m%d).dump"
          ls -lh neon-*.dump

      - name: Configure rclone for R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_KEY: ${{ secrets.R2_BACKUP_ACCESS_KEY_ID }}
          R2_SECRET: ${{ secrets.R2_BACKUP_SECRET_ACCESS_KEY }}
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${R2_KEY}
          secret_access_key = ${R2_SECRET}
          endpoint = https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com
          acl = private
          EOF

      - name: Upload database dump (keep 14 daily dumps)
        env:
          BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
        run: |
          rclone copy "neon-$(date -u +%Y%m%d).dump" "r2:${BACKUP_BUCKET}/neon/"
          rclone delete "r2:${BACKUP_BUCKET}/neon/" --min-age 14d

      - name: Sync R2 originals to backup bucket
        env:
          SOURCE_BUCKET: ${{ secrets.R2_BUCKET }}
          BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
        run: |
          # copy (not sync --delete): deletions in prod never propagate to backup
          rclone copy "r2:${SOURCE_BUCKET}" "r2:${BACKUP_BUCKET}/originals/" --transfers 16

      - name: Report sizes
        env:
          BACKUP_BUCKET: ${{ secrets.R2_BACKUP_BUCKET }}
        run: |
          rclone size "r2:${BACKUP_BUCKET}/neon/"
          rclone size "r2:${BACKUP_BUCKET}/originals/"
