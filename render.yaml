services:
  - type: web
    name: nexus-mission-control
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm run start -w @nexus/mission-control -- -p $PORT
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXUS_ENV
        value: pilot
      - key: NEXT_PUBLIC_NEXUS_ENV
        value: pilot
      - key: NEXUS_DB_REQUIRED
        value: "true"
      - key: NEXUS_LLM_PROVIDER
        value: deepseek
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: NEXUS_LLM_MODEL
        value: deepseek-v4-flash
      - key: NEXUS_VECTOR_SEARCH
        value: enabled
      - key: NEXUS_R2_ORIGINALS
        value: enabled
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /sign-up
      - key: NEXT_PUBLIC_APP_NAME
        value: NexusAI Mission Control
      - key: DATABASE_URL
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXUS_EXTRA_CORS_ORIGINS
        sync: false
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: NEXT_PUBLIC_CLERK_DOMAIN
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NEXUS_CRON_SECRET
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: SLACK_CLIENT_ID
        sync: false
      - key: SLACK_CLIENT_SECRET
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: JIRA_CLIENT_ID
        sync: false
      - key: JIRA_CLIENT_SECRET
        sync: false
      - key: HUBSPOT_CLIENT_ID
        sync: false
      - key: HUBSPOT_CLIENT_SECRET
        sync: false
      - key: QUICKBOOKS_CLIENT_ID
        sync: false
      - key: QUICKBOOKS_CLIENT_SECRET
        sync: false
      - key: QUICKBOOKS_ENVIRONMENT
        sync: false
      - key: LINKEDIN_CLIENT_ID
        sync: false
      - key: LINKEDIN_CLIENT_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: NEXT_PUBLIC_SENTRY_DSN
        sync: false
      - key: SENTRY_ORG
        sync: false
      - key: SENTRY_PROJECT
        sync: false
      - key: SENTRY_AUTH_TOKEN
        sync: false
      - key: NEXUS_RESEND_API_KEY
        sync: false
      - key: NEXUS_FROM_EMAIL
        sync: false
  - type: cron
    name: nexus-dispatch-cron
    runtime: node
    plan: free
    region: oregon
    schedule: "*/2 * * * *"
    buildCommand: npm ci --production
    startCommand: node -e "fetch(process.env.NEXT_PUBLIC_APP_URL+'/api/cron/dispatch',{method:'POST',headers:{Authorization:'Bearer '+process.env.NEXUS_CRON_SECRET,'Content-Type':'application/json'}}).then(r=>{if(!r.ok){console.error(r.status);process.exit(1)}r.json().then(d=>{console.log(JSON.stringify(d));process.exit(0)})}).catch(e=>{console.error(e);process.exit(1)})"
    envVars:
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXUS_CRON_SECRET
        sync: false
  - type: cron
    name: nexus-billing-cron
    runtime: node
    plan: free
    region: oregon
    schedule: "0 0 * * *"
    buildCommand: npm ci --production
    startCommand: node -e "fetch(process.env.NEXT_PUBLIC_APP_URL+'/api/cron/billing',{method:'POST',headers:{Authorization:'Bearer '+process.env.NEXUS_CRON_SECRET,'Content-Type':'application/json'}}).then(r=>{if(!r.ok){console.error(r.status);process.exit(1)}r.json().then(d=>{console.log(JSON.stringify(d));process.exit(0)})}).catch(e=>{console.error(e);process.exit(1)})"
    envVars:
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXUS_CRON_SECRET
        sync: false
  - type: cron
    name: nexus-synthesis-cron
    runtime: node
    plan: free
    region: oregon
    schedule: "0 1 * * *"
    buildCommand: npm ci --production
    startCommand: node -e "fetch(process.env.NEXT_PUBLIC_APP_URL+'/api/cron/synthesis',{method:'POST',headers:{Authorization:'Bearer '+process.env.NEXUS_CRON_SECRET,'Content-Type':'application/json'}}).then(r=>{if(!r.ok){console.error(r.status);process.exit(1)}r.json().then(d=>{console.log(JSON.stringify(d));process.exit(0)})}).catch(e=>{console.error(e);process.exit(1)})"
    envVars:
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXUS_CRON_SECRET
        sync: false
