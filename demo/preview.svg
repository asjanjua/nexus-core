<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Nexus Core executive intelligence preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#111c33"/>
      <stop offset="100%" stop-color="#182b4b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#020617" flood-opacity=".32"/>
    </filter>
    <style>
      .title{font:700 40px Inter,Arial,sans-serif; fill:#f8fafc}
      .sub{font:400 18px Inter,Arial,sans-serif; fill:#cbd5e1}
      .h{font:700 24px Inter,Arial,sans-serif; fill:#0f172a}
      .b{font:400 18px Inter,Arial,sans-serif; fill:#334155}
      .k{font:700 14px Inter,Arial,sans-serif; fill:#0f172a; letter-spacing:.08em; text-transform:uppercase}
      .pill{font:700 13px Inter,Arial,sans-serif; fill:#e2e8f0}
      .mono{font:600 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill:#0f172a}
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1080" cy="110" r="140" fill="#60a5fa" opacity=".16"/>
  <circle cx="180" cy="610" r="180" fill="#22c55e" opacity=".10"/>

  <text x="80" y="92" class="title">Nexus Core</text>
  <text x="80" y="128" class="sub">Evidence-backed executive intelligence from documents and communications</text>

  <g filter="url(#shadow)">
    <rect x="80" y="180" rx="28" ry="28" width="1120" height="470" fill="url(#card)"/>
  </g>

  <rect x="112" y="214" rx="18" ry="18" width="200" height="54" fill="#dbeafe"/>
  <text x="140" y="248" class="k">CEO Brief</text>
  <rect x="324" y="214" rx="18" ry="18" width="220" height="54" fill="#dcfce7"/>
  <text x="352" y="248" class="k">COO Execution</text>
  <rect x="556" y="214" rx="18" ry="18" width="250" height="54" fill="#fef3c7"/>
  <text x="584" y="248" class="k">CBO / Strategy</text>

  <text x="112" y="320" class="h">Today’s Executive Signal</text>
  <text x="112" y="355" class="b">• Top risk: decision ownership is unclear across active workstreams</text>
  <text x="112" y="388" class="b">• Top opportunity: one source of truth for briefs and recommendations</text>
  <text x="112" y="421" class="b">• Top action: review high-confidence recommendations in a weekly queue</text>

  <rect x="112" y="466" rx="20" ry="20" width="440" height="128" fill="#e0f2fe"/>
  <text x="136" y="502" class="k">Evidence trail</text>
  <text x="136" y="534" class="mono">Drive docs   Slack threads   Meeting notes</text>
  <text x="136" y="560" class="mono">Confidence   Freshness       Source links</text>

  <rect x="584" y="466" rx="20" ry="20" width="548" height="128" fill="#ede9fe"/>
  <text x="608" y="502" class="k">What makes it useful</text>
  <text x="608" y="534" class="b">Role-aware outputs, provenance, and an approval queue instead of generic AI chatter.</text>
  <text x="608" y="568" class="b">Install in one command and scaffold a workspace in seconds.</text>

  <rect x="80" y="660" rx="18" ry="18" width="1120" height="28" fill="#0f172a" opacity=".42"/>
  <text x="100" y="680" class="pill">Open-source. MIT licensed. Pilot-ready. Built for strategy, operations, and executive clarity.</text>
</svg>
