<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NexusAI — Offline</title>
    <style>
      :root { color-scheme: dark; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background: linear-gradient(180deg, #090f1b 0%, #0b1220 48%, #080d18 100%);
        color: #e6edf6;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
      }
      .card { max-width: 420px; }
      .logo {
        width: 56px; height: 56px; border-radius: 14px;
        background: #64d8c4; color: #04100d;
        display: grid; place-items: center;
        font-weight: 700; font-size: 28px; margin: 0 auto 20px;
      }
      h1 { font-size: 20px; font-weight: 600; margin: 0 0 8px; }
      p { font-size: 14px; line-height: 1.6; color: #9fb0c3; margin: 0 0 20px; }
      button {
        font: inherit; font-weight: 600; font-size: 14px;
        color: #04100d; background: #64d8c4;
        border: 0; border-radius: 10px; padding: 10px 18px; cursor: pointer;
      }
      button:hover { filter: brightness(1.05); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">N</div>
      <h1>You are offline</h1>
      <p>
        NexusAI needs a connection to reach your workspace and evidence.
        Reconnect and try again.
      </p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
