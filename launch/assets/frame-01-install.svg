<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Nexus Core install frame">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <style>
      .t{font:700 46px Inter,Arial,sans-serif;fill:#f8fafc}
      .s{font:400 22px Inter,Arial,sans-serif;fill:#cbd5e1}
      .m{font:600 18px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#0f172a}
      .h{font:700 22px Inter,Arial,sans-serif;fill:#0f172a}
    </style>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="90" y="118" class="t">Nexus Core</text>
  <text x="90" y="162" class="s">Install in one command. Scaffold a workspace. Check health.</text>
  <rect x="90" y="240" width="1220" height="540" rx="30" fill="#e2e8f0" opacity=".96"/>
  <rect x="140" y="310" width="1120" height="90" rx="18" fill="#dbeafe"/>
  <text x="170" y="366" class="m">curl -fsSL https://raw.githubusercontent.com/asjanjua/nexus-core/main/scripts/install.sh | bash</text>
  <rect x="140" y="440" width="1120" height="100" rx="18" fill="#dcfce7"/>
  <text x="170" y="490" class="h">1. OpenClaw bootstrap</text>
  <text x="170" y="520" class="s" fill="#334155">Auto-installs OpenClaw if needed and prepares the Nexus shell.</text>
  <rect x="140" y="575" width="1120" height="160" rx="18" fill="#ede9fe"/>
  <text x="170" y="625" class="h">2. Ready for `nexus init`</text>
  <text x="170" y="660" class="s" fill="#334155">A simple path from install to workspace scaffold and health checks.</text>
  <text x="170" y="700" class="m">nexus init   nexus doctor   nexus status</text>
</svg>

