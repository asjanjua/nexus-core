<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Nexus Core evidence frame">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <style>
      .t{font:700 46px Inter,Arial,sans-serif;fill:#f8fafc}
      .s{font:400 22px Inter,Arial,sans-serif;fill:#cbd5e1}
      .h{font:700 24px Inter,Arial,sans-serif;fill:#0f172a}
      .b{font:400 18px Inter,Arial,sans-serif;fill:#334155}
      .m{font:600 15px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#0f172a}
    </style>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="90" y="118" class="t">Evidence First</text>
  <text x="90" y="162" class="s">Every recommendation links back to sources, confidence, and freshness.</text>
  <rect x="90" y="240" width="1220" height="560" rx="30" fill="#f8fafc"/>
  <rect x="130" y="290" width="1120" height="120" rx="20" fill="#dbeafe"/>
  <text x="160" y="330" class="h">Recommendation</text>
  <text x="160" y="366" class="b">Prioritize decision ownership and review the approval queue weekly.</text>
  <text x="160" y="396" class="m">confidence: high   freshness: today   source refs: 3</text>
  <rect x="130" y="445" width="1120" height="320" rx="20" fill="#ede9fe"/>
  <text x="160" y="490" class="h">Source trail</text>
  <text x="160" y="535" class="b">Drive docs</text>
  <text x="160" y="575" class="b">Slack threads</text>
  <text x="160" y="615" class="b">Meeting notes</text>
  <text x="160" y="680" class="m">Provenance stays attached so leaders can verify the path from evidence to recommendation.</text>
</svg>

