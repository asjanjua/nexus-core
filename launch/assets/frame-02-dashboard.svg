<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Nexus Core dashboard frame">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <style>
      .t{font:700 46px Inter,Arial,sans-serif;fill:#f8fafc}
      .s{font:400 22px Inter,Arial,sans-serif;fill:#cbd5e1}
      .h{font:700 24px Inter,Arial,sans-serif;fill:#0f172a}
      .b{font:400 18px Inter,Arial,sans-serif;fill:#334155}
      .k{font:700 14px Inter,Arial,sans-serif;fill:#0f172a;letter-spacing:.08em;text-transform:uppercase}
    </style>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <text x="90" y="118" class="t">Executive Dashboard</text>
  <text x="90" y="162" class="s">CEO, COO, and Strategy views over the same evidence base.</text>
  <rect x="90" y="240" width="1220" height="560" rx="30" fill="#f8fafc"/>
  <rect x="130" y="290" width="280" height="90" rx="18" fill="#dbeafe"/>
  <text x="160" y="330" class="k">CEO</text>
  <text x="160" y="360" class="h">Top risks, decisions, priorities</text>
  <rect x="440" y="290" width="280" height="90" rx="18" fill="#dcfce7"/>
  <text x="470" y="330" class="k">COO</text>
  <text x="470" y="360" class="h">Execution, blockers, owners</text>
  <rect x="750" y="290" width="280" height="90" rx="18" fill="#fef3c7"/>
  <text x="780" y="330" class="k">CBO</text>
  <text x="780" y="360" class="h">Opportunities, growth, partnerships</text>
  <rect x="130" y="430" width="1120" height="300" rx="24" fill="#e2e8f0"/>
  <text x="170" y="478" class="h">What leaders see at a glance</text>
  <text x="170" y="520" class="b">• Evidence-backed recommendations</text>
  <text x="170" y="558" class="b">• Clear decision ownership</text>
  <text x="170" y="596" class="b">• Freshness and confidence signals</text>
  <text x="170" y="634" class="b">• Links back to the source trail</text>
  <text x="170" y="694" class="k">Less clutter. More clarity. Faster decisions.</text>
</svg>

